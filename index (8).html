<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RX Gesture Control</title>
<style>
  body {
    margin: 0;
    background: #0d0d12;
    color: #eee;
    font-family: -apple-system, Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 4px;
    color: #7ee787;
  }
  .subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
  }
  .video-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 2px #2a2a35;
  }
  video, canvas {
    width: 100%;
    display: block;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  .status {
    margin-top: 16px;
    width: 100%;
    max-width: 480px;
    background: #16161d;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
  }
  .status .label {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status .value {
    font-size: 22px;
    font-weight: 600;
    margin-top: 2px;
  }
  .gesture-open { color: #7ee787; }
  .gesture-fist { color: #ff7b72; }
  .gesture-none { color: #666; }
  .log {
    margin-top: 12px;
    width: 100%;
    max-width: 480px;
    font-size: 12px;
    color: #888;
    max-height: 100px;
    overflow-y: auto;
    background: #0a0a0e;
    border-radius: 8px;
    padding: 8px 12px;
  }
  .start-btn {
    margin-top: 16px;
    padding: 12px 24px;
    background: #7ee787;
    color: #0d0d12;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>🖐️ RX Gesture Control</h1>
<div class="subtitle">Open palm = ongeza volume &nbsp;|&nbsp; Fist = punguza volume</div>

<button class="start-btn" id="startBtn">Anzisha Kamera</button>

<div class="video-wrap" id="videoWrap" style="display:none;">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
</div>

<div class="status">
  <div class="label">Gesture ya sasa</div>
  <div class="value gesture-none" id="gestureLabel">Hakuna</div>
</div>

<div class="log" id="log"></div>

<!-- MediaPipe Hands kutoka CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const gestureLabel = document.getElementById('gestureLabel');
const logEl = document.getElementById('log');
const startBtn = document.getElementById('startBtn');
const videoWrap = document.getElementById('videoWrap');

let lastSentGesture = null;
let lastSentTime = 0;
const SEND_COOLDOWN_MS = 1000; // sambamba na cooldown ya server

function addLog(text) {
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML = `[${time}] ${text}<br>` + logEl.innerHTML;
}

// Hutuma gesture kwenye server ya Python (Flask) iliyo Termux
async function sendGesture(gesture) {
  const now = Date.now();
  if (gesture === lastSentGesture && now - lastSentTime < SEND_COOLDOWN_MS) {
    return; // epuka kutuma gesture ileile mfululizo
  }
  lastSentGesture = gesture;
  lastSentTime = now;

  try {
    const res = await fetch('/gesture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ gesture })
    });
    const data = await res.json();
    addLog(data.message || data.status);
  } catch (err) {
    addLog('Hitilafu kutuma gesture: ' + err.message);
  }
}

// Tunatambua gesture kwa kuangalia kama vidole vimenyooka au vimekunjwa.
// landmarks ni array ya pointi 21 za mkono (kutoka MediaPipe Hands).
function classifyGesture(landmarks) {
  // Vidole: index(8), middle(12), ring(16), pinky(20)
  // Kila kidole: ncha (tip) na kifundo cha chini (pip joint)
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];

  let extendedCount = 0;
  for (let i = 0; i < tips.length; i++) {
    const tip = landmarks[tips[i]];
    const pip = landmarks[pips[i]];
    // Kama ncha ya kidole iko juu zaidi (y ndogo) kuliko kifundo,
    // kidole kimenyooka (extended)
    if (tip.y < pip.y) {
      extendedCount++;
    }
  }

  if (extendedCount >= 3) {
    return 'open_palm'; // vidole vingi vimenyooka -> mkono wazi
  } else if (extendedCount === 0) {
    return 'fist'; // hakuna kidole kimenyooka -> ngumi
  }
  return null; // hali ya katikati, hatufanyi lolote
}

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults((results) => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];

    // Chora mkono kwenye skrini
    drawConnectors(ctx, landmarks, Hands.HAND_CONNECTIONS, { color: '#7ee787', lineWidth: 3 });
    drawLandmarks(ctx, landmarks, { color: '#ff7b72', lineWidth: 1, radius: 3 });

    const gesture = classifyGesture(landmarks);

    if (gesture === 'open_palm') {
      gestureLabel.textContent = '✋ Mkono Wazi';
      gestureLabel.className = 'value gesture-open';
      sendGesture('open_palm');
    } else if (gesture === 'fist') {
      gestureLabel.textContent = '✊ Ngumi';
      gestureLabel.className = 'value gesture-fist';
      sendGesture('fist');
    } else {
      gestureLabel.textContent = 'Inatambua...';
      gestureLabel.className = 'value gesture-none';
    }
  } else {
    gestureLabel.textContent = 'Hakuna mkono';
    gestureLabel.className = 'value gesture-none';
  }

  ctx.restore();
});

startBtn.addEventListener('click', async () => {
  startBtn.style.display = 'none';
  videoWrap.style.display = 'block';

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 480,
    height: 360,
    facingMode: 'environment' // tumia kamera ya nyuma; badilisha 'user' kwa mbele
  });
  camera.start();
  addLog('Kamera imeanza...');
});
</script>

</body>
</html>
